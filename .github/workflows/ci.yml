name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17', '21']
        keycloak: ['26.6.3', '26.7.0']
    name: JDK ${{ matrix.java }} / Keycloak ${{ matrix.keycloak }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build and test
        run: mvn -B --no-transfer-progress -Dkeycloak.version=${{ matrix.keycloak }} clean verify
